<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>愛は風と共に昇る</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --pink:#d199ad;
  --dark:#1f1f1f;
  --white:#ffffff;
  --pink-light:#f0d6e4;
  --pink-dark:#b07890;
  --dark2:#2a2a2a;
  --dark3:#333;
  --dark4:#444;
  --gray:#888;
  --gray2:#555;
  --text:#f0f0f0;
  --text2:#ccc;
  --text3:#aaa;
  --radius:12px;
  --rad-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:var(--text);width:100%;max-width:430px;margin:0 auto;height:100dvh;overflow:hidden;position:relative;}
#app{width:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--dark);transition:transform .25s ease;transform:translateX(100%);z-index:1;}
.screen.active{transform:translateX(0);z-index:10;}
.screen.base{transform:translateX(0);z-index:1;}

.hdr{background:var(--dark2);padding:14px 16px 10px;border-bottom:1px solid #333;flex-shrink:0;}
.hdr-title{font-size:18px;font-weight:600;color:var(--pink);text-align:center;}

.tabbar{display:flex;background:var(--dark2);border-top:1px solid #333;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;gap:3px;}
.tab-icon{font-size:22px;}
.tab-label{font-size:10px;color:var(--gray);}
.tab.active .tab-label{color:var(--pink);}

.navtabs{display:flex;background:var(--dark2);border-bottom:1px solid #333;flex-shrink:0;}
.navtab{flex:1;text-align:center;padding:10px 4px;font-size:11px;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;}
.navtab.active{color:var(--pink);border-bottom-color:var(--pink);}

.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.list-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #2a2a2a;cursor:pointer;gap:12px;position:relative;}
.list-item:active{background:#2a2a2a;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:500;color:var(--text);}
.item-sub{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pin-badge{background:var(--pink);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px;}

.btn{background:var(--pink);color:#fff;border:none;border-radius:var(--rad-sm);padding:12px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;}
.btn:active{opacity:.8;}
.btn-outline{background:transparent;border:1px solid var(--pink);color:var(--pink);border-radius:var(--rad-sm);padding:10px 20px;font-size:14px;cursor:pointer;flex:1;}
.btn-danger{background:#c0392b;color:#fff;border:none;border-radius:var(--rad-sm);padding:12px 20px;font-size:15px;cursor:pointer;flex:1;}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;}

.inp{background:#2a2a2a;border:1px solid #444;border-radius:var(--rad-sm);color:var(--text);padding:10px 12px;font-size:14px;width:100%;}
.inp:focus{outline:none;border-color:var(--pink);}
textarea.inp{resize:none;min-height:80px;}
.inp-label{font-size:12px;color:var(--text3);margin-bottom:4px;}

.chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.msg{max-width:78%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg.me{background:var(--pink);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.msg.ai{background:#2a2a2a;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.msg-time{font-size:10px;color:var(--text3);text-align:center;margin:2px 0;}
.typing-indicator{display:flex;gap:4px;padding:10px 13px;background:#2a2a2a;border-radius:16px;align-self:flex-start;border-bottom-left-radius:4px;}
.typing-dot{width:7px;height:7px;background:var(--gray);border-radius:50%;animation:blink 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3;}40%{opacity:1;}}
.chat-input-area{display:flex;gap:8px;padding:10px 12px;background:var(--dark2);border-top:1px solid #333;align-items:flex-end;}
.chat-input{flex:1;background:#2a2a2a;border:1px solid #444;border-radius:20px;color:var(--text);padding:8px 14px;font-size:14px;resize:none;max-height:100px;overflow-y:auto;outline:none;}
.chat-input:focus{border-color:var(--pink);}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--pink);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.ctx-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);}
.ctx-menu{position:fixed;background:#2a2a2a;border-radius:var(--radius);min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.5);padding:8px 0;z-index:101;}
.ctx-title{font-size:10px;color:var(--gray);padding:4px 12px 8px;border-bottom:1px solid #444;margin-bottom:4px;}
.ctx-item{padding:11px 16px;font-size:14px;cursor:pointer;color:var(--text);}
.ctx-item:active{background:#333;}
.ctx-item.danger{color:#e74c3c;}

.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#2a2a2a;border-radius:var(--radius);padding:20px;width:100%;max-width:320px;}
.modal-title{font-size:16px;font-weight:600;color:var(--pink);margin-bottom:16px;text-align:center;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}

.profile-header{display:flex;align-items:center;gap:14px;padding:20px 16px;background:var(--dark2);border-bottom:1px solid #333;}
.profile-name{font-size:17px;font-weight:600;color:var(--text);}
.profile-sig{font-size:12px;color:var(--text3);margin-top:2px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #2a2a2a;cursor:pointer;}
.settings-row:active{background:#2a2a2a;}

.feed-item{padding:14px 16px;border-bottom:1px solid #2a2a2a;}
.feed-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.feed-content{font-size:14px;line-height:1.6;color:var(--text);margin-bottom:10px;}
.feed-actions{display:flex;gap:16px;}
.feed-action{font-size:12px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px;}
.feed-action.liked{color:var(--pink);}
.feed-comments{margin-top:8px;background:#2a2a2a;border-radius:8px;padding:8px 10px;}
.feed-comment{font-size:12px;color:var(--text2);padding:3px 0;}
.comment-name{color:var(--pink);font-weight:500;}

.avatar-picker{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:8px;}
.shape-toggle{display:flex;gap:8px;}
.shape-btn{padding:6px 14px;border-radius:20px;border:1px solid #444;font-size:12px;cursor:pointer;color:var(--text3);}
.shape-btn.active{border-color:var(--pink);color:var(--pink);}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--gray);padding:40px;}
.empty-icon{font-size:48px;}
.empty-text{font-size:14px;text-align:center;}

.back-btn{width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}

::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div id="app">
  <div id="root-screen" class="screen base"></div>
  <div id="sub-screen" class="screen"></div>
  <div id="chat-screen" class="screen"></div>
  <div id="modal-container"></div>
</div>
<script>
let S=loadState();
let activeTab='chat';
let activeNavTab='quick';
let _typingDebounce=null;

function defaultState(){
  return{me:{name:'私',sig:'よろしく',avatar:'',avatarShape:'circle',persona:''},contacts:[],groups:[],messages:{},pinnedId:null,feed:[],apiUrl:'https://api.groq.com/openai/v1/chat/completions',apiKey:'',model:'llama3-8b-8192'};
}
function loadState(){
  try{const raw=localStorage.getItem('aiai_app');if(raw){return Object.assign(defaultState(),JSON.parse(raw));}}catch(e){}
  return defaultState();
}
function save(){try{localStorage.setItem('aiai_app',JSON.stringify(S));}catch(e){}}
function uid(){return Math.random().toString(36).slice(2,9);}
function fmt(d){const now=new Date();const dd=new Date(d);const diff=now-dd;if(diff<60000)return'今';if(diff<3600000)return Math.floor(diff/60000)+'分前';if(diff<86400000)return Math.floor(diff/3600000)+'時間前';return dd.toLocaleDateString('ja-JP',{month:'short',day:'numeric'});}
function fmtTime(d){return new Date(d).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}

function avEl(contact,size=44){
  const shape=contact.avatarShape||'circle';
  const br=shape==='circle'?'50%':'8px';
  if(contact.avatar)return`<div style="width:${size}px;height:${size}px;border-radius:${br};overflow:hidden;flex-shrink:0;"><img src="${contact.avatar}" style="width:100%;height:100%;object-fit:cover;"></div>`;
  return`<div style="width:${size}px;height:${size}px;border-radius:${br};background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size/2.4)}px;flex-shrink:0;">${(contact.name||'?').charAt(0)}</div>`;
}
function meAvEl(size=44){
  const br=(S.me.avatarShape||'circle')==='circle'?'50%':'8px';
  if(S.me.avatar)return`<div style="width:${size}px;height:${size}px;border-radius:${br};overflow:hidden;flex-shrink:0;"><img src="${S.me.avatar}" style="width:100%;height:100%;object-fit:cover;"></div>`;
  return`<div style="width:${size}px;height:${size}px;border-radius:${br};background:#555;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size/2.4)}px;flex-shrink:0;">${(S.me.name||'私').charAt(0)}</div>`;
}

async function callAI(messages,systemPrompt){
  if(!S.apiKey)return null;
  const url=S.apiUrl||'https://api.groq.com/openai/v1/chat/completions';
  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},body:JSON.stringify({model:S.model||'llama3-8b-8192',messages:[{role:'system',content:systemPrompt},...messages],max_tokens:400,temperature:0.9})});
    const d=await r.json();
    if(d.choices&&d.choices[0])return d.choices[0].message.content.trim();
    return null;
  }catch(e){return null;}
}

const root=document.getElementById('root-screen');
const sub=document.getElementById('sub-screen');
const chatScr=document.getElementById('chat-screen');
const modalCon=document.getElementById('modal-container');

function goSub(html){sub.innerHTML=html;sub.classList.add('active');}
function closeSub(){sub.classList.remove('active');sub.innerHTML='';}
function goChat(html){chatScr.innerHTML=html;chatScr.classList.add('active');}
function closeChat(){chatScr.classList.remove('active');chatScr.innerHTML='';window._activeChatId=null;renderRoot();}
function showModal(html){modalCon.innerHTML=`<div class="modal-overlay">${html}</div>`;}
function closeModal(){modalCon.innerHTML='';}

function renderRoot(){
  root.innerHTML=`
    <div style="display:flex;flex-direction:column;height:100dvh;">
      <div class="hdr"><div class="hdr-title">愛は風と共に昇る</div></div>
      <div id="nav-area"></div>
      <div id="content-area" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
      <div class="tabbar">
        <div class="tab ${activeTab==='chat'?'active':''}" onclick="setTab('chat')"><div class="tab-icon">💬</div><div class="tab-label">チャット</div></div>
        <div class="tab ${activeTab==='feed'?'active':''}" onclick="setTab('feed')"><div class="tab-icon">🌸</div><div class="tab-label">最新情報</div></div>
        <div class="tab ${activeTab==='settings'?'active':''}" onclick="setTab('settings')"><div class="tab-icon">⚙️</div><div class="tab-label">設定</div></div>
      </div>
    </div>`;
  renderTab();
}
function setTab(t){activeTab=t;renderRoot();}
function setNavTab(t){activeNavTab=t;renderNavContent();}

function renderTab(){
  if(activeTab==='chat')renderChatTab();
  else if(activeTab==='feed')renderFeedTab();
  else renderSettingsTab();
}

function renderChatTab(){
  document.getElementById('nav-area').innerHTML=`
    <div class="navtabs">
      <div class="navtab ${activeNavTab==='quick'?'active':''}" onclick="setNavTab('quick')">クイックリスト</div>
      <div class="navtab ${activeNavTab==='groups'?'active':''}" onclick="setNavTab('groups')">グループ</div>
      <div class="navtab ${activeNavTab==='friends'?'active':''}" onclick="setNavTab('friends')">友達</div>
      <div class="navtab" onclick="addContact()" style="color:var(--pink);">に追加</div>
    </div>`;
  renderNavContent();
}

function renderNavContent(){
  const ca=document.getElementById('content-area');if(!ca)return;
  if(activeNavTab==='quick')renderQuickList(ca);
  else if(activeNavTab==='groups')renderGroups(ca);
  else renderFriends(ca);
}

function renderQuickList(ca){
  const pinned=S.contacts.find(c=>c.id===S.pinnedId);
  if(pinned){
    ca.innerHTML=`<div class="list"><div class="list-item" data-id="${pinned.id}">${avEl(pinned)}<div class="item-info"><div class="item-name">${pinned.name}<span class="pin-badge">📌 ピン留め</span></div><div class="item-sub">${lastMsg(pinned.id)}</div></div></div></div>`;
    const el=ca.querySelector('.list-item');
    if(el){el.onclick=()=>openChat(pinned.id);addLongPress(el,()=>ctxMenu(null,pinned.id));}
  } else {
    ca.innerHTML=`<div class="list"><div class="empty-state"><div class="empty-icon">📌</div><div class="empty-text">友達を長押しでピン留めできます</div></div></div>`;
  }
}

function renderGroups(ca){
  if(S.groups.length===0){
    ca.innerHTML=`<div class="list"><div class="empty-state"><div class="empty-icon">👥</div><div style="margin-top:8px;"><button class="btn" onclick="createGroup()">グループを作成する</button></div></div></div>`;
    return;
  }
  let html='<div class="list">';
  S.groups.forEach(g=>{
    html+=`<div class="list-item" onclick="openGroupChat('${g.id}')"><div style="width:44px;height:44px;border-radius:50%;background:#555;display:flex;align-items:center;justify-content:center;font-size:18px;">👥</div><div class="item-info"><div class="item-name">${g.name}</div><div class="item-sub">${g.members.length}名のメンバー</div></div></div>`;
  });
  html+=`<div style="padding:16px;"><button class="btn" onclick="createGroup()">+ グループを作成する</button></div></div>`;
  ca.innerHTML=html;
}

function renderFriends(ca){
  if(S.contacts.length===0){
    ca.innerHTML=`<div class="list"><div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">友達を追加してください</div><button class="btn btn-sm" onclick="addContact()" style="margin-top:12px;">に追加</button></div></div>`;
    return;
  }
  let html='<div class="list">';
  S.contacts.forEach(c=>{
    html+=`<div class="list-item" data-id="${c.id}">${avEl(c)}<div class="item-info"><div class="item-name">${c.name}</div><div class="item-sub">${c.sig||''}</div></div></div>`;
  });
  html+='</div>';
  ca.innerHTML=html;
  ca.querySelectorAll('.list-item[data-id]').forEach(el=>{
    const id=el.dataset.id;
    el.onclick=()=>openFriendDetail(id);
    addLongPress(el,()=>ctxMenu(null,id));
  });
}

function lastMsg(cid){
  const msgs=(S.messages[cid]||[]);
  if(!msgs.length)return'会話を開始する';
  return msgs[msgs.length-1].text.slice(0,30);
}

function addLongPress(el,cb){
  let t=null;
  el.addEventListener('touchstart',()=>{t=setTimeout(cb,500);},{passive:true});
  el.addEventListener('touchend',()=>clearTimeout(t),{passive:true});
  el.addEventListener('touchmove',()=>clearTimeout(t),{passive:true});
  el.addEventListener('mousedown',e=>{if(e.button===2)return;t=setTimeout(cb,500);});
  el.addEventListener('mouseup',()=>clearTimeout(t));
  el.addEventListener('contextmenu',e=>{e.preventDefault();cb();});
}

function ctxMenu(e,cid){
  const contact=S.contacts.find(c=>c.id===cid);if(!contact)return;
  const isPinned=S.pinnedId===cid;
  const x=e?e.clientX:window.innerWidth/2-80;
  const y=e?e.clientY:window.innerHeight/2;
  const left=Math.min(x,window.innerWidth-180);
  const top=Math.min(y,window.innerHeight-160);
  modalCon.innerHTML=`
    <div class="ctx-overlay" onclick="closeModal()"></div>
    <div class="ctx-menu" style="left:${left}px;top:${top}px;">
      <div class="ctx-title">メニュー</div>
      <div class="ctx-item" onclick="pinContact('${cid}')">${isPinned?'📌 ピン留め解除':'📌 ピン留め'}</div>
      <div class="ctx-item danger" onclick="deleteContact('${cid}')">連絡先を削除</div>
      <div class="ctx-item" onclick="closeModal();editContact('${cid}')">情報の編集</div>
    </div>`;
}

function pinContact(cid){S.pinnedId=S.pinnedId===cid?null:cid;save();closeModal();renderRoot();}

function deleteContact(cid){
  showModal(`<div class="modal"><div class="modal-title">削除の確認</div><p style="text-align:center;font-size:13px;color:var(--text3);">この連絡先を削除しますか？</p><div class="modal-btns"><button class="btn-danger" onclick="confirmDelete('${cid}')">削除</button><button class="btn-outline" onclick="closeModal()">キャンセル</button></div></div>`);
}
function confirmDelete(cid){
  S.contacts=S.contacts.filter(c=>c.id!==cid);
  if(S.pinnedId===cid)S.pinnedId=null;
  delete S.messages[cid];
  save();closeModal();renderRoot();
}

function addContact(){
  window._newAvatar='';window._newShape='circle';
  goSub(`
    <div style="display:flex;flex-direction:column;height:100dvh;">
      <div class="hdr" style="display:flex;align-items:center;gap:12px;">
        <div class="back-btn" onclick="closeSub()">←</div>
        <div style="flex:1;text-align:center;font-size:16px;font-weight:600;color:var(--pink);">に追加</div>
        <div style="width:32px;"></div>
      </div>
      <div class="list" style="padding:16px;display:flex;flex-direction:column;gap:14px;">
        <div class="avatar-picker">
          <div id="new-av-preview" style="width:80px;height:80px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;cursor:pointer;" onclick="document.getElementById('new-av-file').click()">👤</div>
          <input type="file" id="new-av-file" accept="image/*" style="display:none;" onchange="previewNewAv(this)">
          <div class="shape-toggle">
            <div class="shape-btn active" id="shape-circle" onclick="setNewShape('circle')">⭕ 円形</div>
            <div class="shape-btn" id="shape-square" onclick="setNewShape('square')">⬜ 角丸</div>
          </div>
        </div>
        <div><div class="inp-label">名前</div><input class="inp" id="new-name" placeholder="名前を入力"></div>
        <div><div class="inp-label">個性（個簽）</div><input class="inp" id="new-sig" placeholder="一言コメント"></div>
        <div><div class="inp-label">キャラクターデザイン（人設）</div><textarea class="inp" id="new-persona" placeholder="AIの性格・人設を入力してください"></textarea></div>
        <div><div class="inp-label">動態頻度（時間ごと）</div><input class="inp" id="new-freq" type="number" value="24" min="1"></div>
        <button class="btn" onclick="saveNewContact()">追加する</button>
      </div>
    </div>`);
}

function previewNewAv(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    window._newAvatar=e.target.result;
    const br=window._newShape==='circle'?'50%':'8px';
    const el=document.getElementById('new-av-preview');
    if(el){el.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;el.style.borderRadius=br;}
  };
  r.readAsDataURL(f);
}
function setNewShape(s){
  window._newShape=s;
  const el=document.getElementById('new-av-preview');
  if(el)el.style.borderRadius=s==='circle'?'50%':'8px';
  document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('shape-'+s)?.classList.add('active');
}
function saveNewContact(){
  const name=document.getElementById('new-name')?.value.trim();
  if(!name){alert('名前を入力してください');return;}
  const c={id:uid(),name,sig:document.getElementById('new-sig')?.value.trim()||'',persona:document.getElementById('new-persona')?.value.trim()||'',avatar:window._newAvatar||'',avatarShape:window._newShape||'circle',chatBg:'',voiceBg:'',feedFreq:parseInt(document.getElementById('new-freq')?.value)||24,lastFeedTime:0};
  S.contacts.push(c);save();closeSub();renderRoot();scheduleAIFeed(c.id);
}

function editContact(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c)return;
  window._editAv=c.avatar||'';window._editMeAv=c.myAvatarOverride||'';window._editShape=c.avatarShape||'circle';
  const br=(c.avatarShape||'circle')==='circle'?'50%':'8px';
  goSub(`
    <div style="display:flex;flex-direction:column;height:100dvh;">
      <div class="hdr" style="display:flex;align-items:center;gap:12px;">
        <div class="back-btn" onclick="closeSub()">←</div>
        <div style="flex:1;text-align:center;font-size:16px;font-weight:600;color:var(--pink);">連絡担当者編集</div>
        <div style="width:32px;"></div>
      </div>
      <div class="list" style="padding:16px;display:flex;flex-direction:column;gap:14px;">
        <div style="font-size:11px;color:var(--text3);text-align:center;">連絡担当者編集</div>
        <div style="font-size:12px;color:var(--text3);">AIキャラクターの頭像</div>
        <div class="avatar-picker">
          <div id="edit-av-preview" style="width:80px;height:80px;border-radius:${br};background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;cursor:pointer;" onclick="document.getElementById('edit-av-file').click()">${c.avatar?`<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;">`:(c.name||'?').charAt(0)}</div>
          <input type="file" id="edit-av-file" accept="image/*" style="display:none;" onchange="previewEditAv(this)">
          <div class="shape-toggle">
            <div class="shape-btn ${(c.avatarShape||'circle')==='circle'?'active':''}" id="edit-shape-circle" onclick="setEditShape('circle')">⭕ 円形</div>
            <div class="shape-btn ${c.avatarShape==='square'?'active':''}" id="edit-shape-square" onclick="setEditShape('square')">⬜ 角丸</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text3);">私の頭像（このチャット用）</div>
        <div class="avatar-picker">
          <div id="edit-me-av-preview" style="width:60px;height:60px;border-radius:${(S.me.avatarShape||'circle')==='circle'?'50%':'8px'};background:#555;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;cursor:pointer;" onclick="document.getElementById('edit-me-file').click()">${c.myAvatarOverride?`<img src="${c.myAvatarOverride}" style="width:100%;height:100%;object-fit:cover;">`:(S.me.avatar?`<img src="${S.me.avatar}" style="width:100%;height:100%;object-fit:cover;">`:S.me.name.charAt(0))}</div>
          <input type="file" id="edit-me-file" accept="image/*" style="display:none;" onchange="previewMeAv(this)">
        </div>
        <div><div class="inp-label">名前</div><input class="inp" id="edit-name" value="${c.name}"></div>
        <div><div class="inp-label">個性（個簽）</div><input class="inp" id="edit-sig" value="${c.sig||''}"></div>
        <div><div class="inp-label">キャラクターデザイン（人設）</div><textarea class="inp" id="edit-persona">${c.persona||''}</textarea></div>
        <div><div class="inp-label">チャット背景URL</div><input class="inp" id="edit-chatbg" value="${c.chatBg||''}" placeholder="背景画像URL"></div>
        <div><div class="inp-label">通話背景URL</div><input class="inp" id="edit-voicebg" value="${c.voiceBg||''}" placeholder="通話背景URL"></div>
        <div><div class="inp-label">動態頻度（時間ごと）</div><input class="inp" id="edit-freq" type="number" value="${c.feedFreq||24}" min="1"></div>
        <button class="btn" onclick="saveEditContact('${cid}')">保存</button>
      </div>
    </div>`);
}

function previewEditAv(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    window._editAv=e.target.result;
    const el=document.getElementById('edit-av-preview');
    if(el){el.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;}
  };r.readAsDataURL(f);
}
function previewMeAv(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    window._editMeAv=e.target.result;
    const el=document.getElementById('edit-me-av-preview');
    if(el)el.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
  };r.readAsDataURL(f);
}
function setEditShape(s){
  window._editShape=s;
  const el=document.getElementById('edit-av-preview');
  if(el)el.style.borderRadius=s==='circle'?'50%':'8px';
  document.querySelectorAll('#edit-shape-circle,#edit-shape-square').forEach(b=>b.classList.remove('active'));
  document.getElementById('edit-shape-'+s)?.classList.add('active');
}
function saveEditContact(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c)return;
  c.name=document.getElementById('edit-name')?.value.trim()||c.name;
  c.sig=document.getElementById('edit-sig')?.value.trim()||'';
  c.persona=document.getElementById('edit-persona')?.value.trim()||'';
  c.chatBg=document.getElementById('edit-chatbg')?.value.trim()||'';
  c.voiceBg=document.getElementById('edit-voicebg')?.value.trim()||'';
  c.feedFreq=parseInt(document.getElementById('edit-freq')?.value)||24;
  c.avatar=window._editAv||c.avatar||'';
  c.avatarShape=window._editShape||c.avatarShape||'circle';
  if(window._editMeAv)c.myAvatarOverride=window._editMeAv;
  save();closeSub();renderRoot();
}

function openFriendDetail(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c)return;
  const br=(c.avatarShape||'circle')==='circle'?'50%':'8px';
  goSub(`
    <div style="display:flex;flex-direction:column;height:100dvh;">
      <div class="hdr" style="display:flex;align-items:center;gap:12px;">
        <div class="back-btn" onclick="closeSub()">←</div>
        <div style="flex:1;text-align:center;font-size:16px;font-weight:600;color:var(--pink);">${c.name}</div>
        <div style="width:32px;"></div>
      </div>
      <div class="list" style="padding:20px 16px;display:flex;flex-direction:column;gap:16px;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
          <div style="width:80px;height:80px;border-radius:${br};background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;">${c.avatar?`<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;">`:(c.name||'?').charAt(0)}</div>
          <div style="font-size:13px;color:var(--text3);">${c.sig||'個簽なし'}</div>
        </div>
        <div style="background:#2a2a2a;border-radius:var(--radius);padding:14px;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">最新情報</div>
          <div id="latest-info-${cid}" style="font-size:13px;color:var(--text2);">読み込み中...</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">キャラクターデザイン</div>
          <textarea class="inp" id="persona-edit-${cid}" style="min-height:100px;">${c.persona||''}</textarea>
          <button class="btn btn-sm" style="margin-top:8px;" onclick="savePersona('${cid}')">人設を保存</button>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn" onclick="closeSub();openChat('${cid}')">💬 メッセージを送信</button>
          <button class="btn-outline" onclick="closeSub();editContact('${cid}')">データ編集</button>
        </div>
      </div>
    </div>`);
  loadLatestInfo(cid);
}

async function loadLatestInfo(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c)return;
  const el=document.getElementById('latest-info-'+cid);if(!el)return;
  if(!S.apiKey){el.textContent='（API設定が必要です）';return;}
  const text=await callAI([{role:'user',content:`${c.name}の今日の近況を1〜2文で日本語で教えてください。`}],c.persona||`あなたは${c.name}というキャラクターです。`);
  if(el)el.textContent=text||'近況情報がありません';
}

function savePersona(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c)return;
  const el=document.getElementById('persona-edit-'+cid);
  if(el)c.persona=el.value.trim();
  save();alert('保存しました');
}

function createGroup(){
  if(S.contacts.length===0){alert('まず友達を追加してください');return;}
  const checks=S.contacts.map(c=>`<label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #333;cursor:pointer;"><input type="checkbox" id="gc-${c.id}" value="${c.id}" style="width:18px;height:18px;accent-color:var(--pink);">${avEl(c,36)}<span style="font-size:14px;">${c.name}</span></label>`).join('');
  goSub(`
    <div style="display:flex;flex-direction:column;height:100dvh;">
      <div class="hdr" style="display:flex;align-items:center;gap:12px;">
        <div class="back-btn" onclick="closeSub()">←</div>
        <div style="flex:1;text-align:center;font-size:16px;font-weight:600;color:var(--pink);">グループを作成する</div>
        <div style="width:32px;"></div>
      </div>
      <div class="list" style="padding:16px;display:flex;flex-direction:column;gap:12px;">
        <div><div class="inp-label">グループ名</div><input class="inp" id="gname" placeholder="グループ名を入力"></div>
        <div style="font-size:12px;color:var(--text3);">メンバーを選択</div>
        ${checks}
        <button class="btn" onclick="saveGroup()">作成する</button>
      </div>
    </div>`);
}
function saveGroup(){
  const name=document.getElementById('gname')?.value.trim();
  if(!name){alert('グループ名を入力してください');return;}
  const members=[];
  S.contacts.forEach(c=>{const el=document.getElementById('gc-'+c.id);if(el&&el.checked)members.push(c.id);});
  if(!members.length){alert('メンバーを選択してください');return;}
  S.groups.push({id:uid(),name,members});
  save();closeSub();setNavTab('groups');renderRoot();
}
function openGroupChat(gid){
  const g=S.groups.find(x=>x.id===gid);if(!g)return;
  openChat(gid,g.name,true);
}

function openChat(cid,nameOverride,isGroup){
  const msgs=S.messages[cid]||[];
  let contact=null,chatName=nameOverride||'チャット',chatBg='';
  if(!isGroup){contact=S.contacts.find(x=>x.id===cid);if(contact){chatName=contact.name;chatBg=contact.chatBg||'';}}
  const bgStyle=chatBg?`background:url('${chatBg}') center/cover;`:'';
  let html=`
    <div style="display:flex;flex-direction:column;height:100dvh;${bgStyle}">
      <div class="hdr" style="display:flex;align-items:center;gap:12px;background:rgba(31,31,31,0.95);">
        <div class="back-btn" onclick="closeChat()">←</div>
        ${contact?avEl(contact,36):'<div style="width:36px;height:36px;border-radius:50%;background:#555;display:flex;align-items:center;justify-content:center;">👥</div>'}
        <div style="flex:1;font-size:16px;font-weight:600;color:var(--text);">${chatName}</div>
      </div>
      <div class="chat-area" id="chat-area">`;
  msgs.forEach(m=>{
    const isMe=m.sender==='me';
    html+=`<div style="display:flex;align-items:flex-end;gap:6px;${isMe?'justify-content:flex-end;':''}">
      ${!isMe&&contact?avEl(contact,28):''}
      <div><div class="msg ${isMe?'me':'ai'}">${m.text}</div><div class="msg-time" style="text-align:${isMe?'right':'left'}">${fmtTime(m.ts)}</div></div>
      ${isMe?meAvEl(28):''}
    </div>`;
  });
  html+=`</div>
      <div class="chat-input-area" style="background:rgba(31,31,31,0.95);">
        <textarea class="chat-input" id="chat-inp" placeholder="メッセージを入力" rows="1" oninput="onChatInput('${cid}')"></textarea>
        <button class="send-btn" onclick="sendMsg('${cid}')">➤</button>
      </div>
    </div>`;
  goChat(html);
  scrollChatBottom();
  window._activeChatId=cid;
  window._activeChatIsGroup=isGroup;
}

function scrollChatBottom(){setTimeout(()=>{const el=document.getElementById('chat-area');if(el)el.scrollTop=el.scrollHeight;},50);}

function onChatInput(cid){
  clearTimeout(_typingDebounce);
  clearTimeout(window._aiReplyTimer);
  const inp=document.getElementById('chat-inp');
  if(inp){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';}
  _typingDebounce=setTimeout(()=>scheduleAIReply(cid),4000);
}

function scheduleAIReply(cid){
  if(window._activeChatId!==cid)return;
  const msgs=S.messages[cid]||[];
  if(!msgs.length||msgs[msgs.length-1].sender!=='me')return;
  const delay=Math.random()*39000+1000;
  window._aiReplyTimer=setTimeout(()=>{if(window._activeChatId===cid)showTypingAndReply(cid);},delay);
}

function showTypingAndReply(cid){
  const msgs=S.messages[cid]||[];
  if(!msgs.length||msgs[msgs.length-1].sender!=='me')return;
  const area=document.getElementById('chat-area');if(!area)return;
  const contact=S.contacts.find(x=>x.id===cid);
  const typDiv=document.createElement('div');
  typDiv.id='ai-typing';
  typDiv.innerHTML=`<div style="display:flex;align-items:flex-end;gap:6px;">${contact?avEl(contact,28):''}<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  area.appendChild(typDiv);scrollChatBottom();
  getAIReply(cid).then(reply=>{
    const td=document.getElementById('ai-typing');if(td)td.remove();
    if(!reply)return;
    addMsg(cid,'ai',reply);renderChatMsg(cid,{sender:'ai',text:reply,ts:Date.now()});scrollChatBottom();
  });
}

async function getAIReply(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c||!S.apiKey)return null;
  const msgs=(S.messages[cid]||[]).slice(-12).map(m=>({role:m.sender==='me'?'user':'assistant',content:m.text}));
  return await callAI(msgs,`${c.persona||`あなたは${c.name}です。`}\n私の名前は${S.me.name}です。${S.me.persona?'私の設定: '+S.me.persona:''}\n自然な会話を日本語でしてください。短めに返答してください。`);
}

function addMsg(cid,sender,text){
  if(!S.messages[cid])S.messages[cid]=[];
  S.messages[cid].push({sender,text,ts:Date.now()});save();
}
function renderChatMsg(cid,m){
  const area=document.getElementById('chat-area');if(!area)return;
  const isMe=m.sender==='me';
  const contact=S.contacts.find(x=>x.id===cid);
  const div=document.createElement('div');
  div.style.cssText=`display:flex;align-items:flex-end;gap:6px;${isMe?'justify-content:flex-end;':''}`;
  div.innerHTML=`${!isMe&&contact?avEl(contact,28):''}<div><div class="msg ${isMe?'me':'ai'}">${m.text}</div><div class="msg-time" style="text-align:${isMe?'right':'left'}">${fmtTime(m.ts)}</div></div>${isMe?meAvEl(28):''}`;
  area.appendChild(div);
}
function sendMsg(cid){
  const inp=document.getElementById('chat-inp');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  addMsg(cid,'me',text);renderChatMsg(cid,{sender:'me',text,ts:Date.now()});scrollChatBottom();
  clearTimeout(window._aiReplyTimer);clearTimeout(_typingDebounce);
  _typingDebounce=setTimeout(()=>scheduleAIReply(cid),4000);
}

function renderFeedTab(){
  document.getElementById('nav-area').innerHTML='';
  const ca=document.getElementById('content-area');
  const allPosts=[...S.feed].sort((a,b)=>b.ts-a.ts);
  let html=`<div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #2a2a2a;justify-content:space-between;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;">${meAvEl(40)}<div><div style="font-size:15px;font-weight:500;">${S.me.name}</div><div style="font-size:12px;color:var(--text3);">${S.me.sig||''}</div></div></div>
    <div onclick="createPost()" style="width:34px;height:34px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;">+</div>
  </div><div class="list" id="feed-list">`;
  if(!allPosts.length){
    html+=`<div class="empty-state"><div class="empty-icon">🌸</div><div class="empty-text">まだ投稿がありません<br>+ボタンで投稿してみよう</div></div>`;
  } else {
    allPosts.forEach(p=>html+=renderPost(p));
  }
  html+=`</div>`;
  ca.innerHTML=html;
}

function renderPost(post){
  const isMe=post.authorId==='me';
  const contact=S.contacts.find(c=>c.id===post.authorId);
  const authorName=isMe?S.me.name:(contact?.name||'?');
  const authorAv=isMe?meAvEl(36):avEl(contact||{name:'?',avatar:'',avatarShape:'circle'},36);
  const liked=post.likedBy&&post.likedBy.includes('me');
  const likeCount=post.likedBy?post.likedBy.length:0;
  let commentsHtml='';
  if(post.comments&&post.comments.length>0){
    commentsHtml='<div class="feed-comments">';
    post.comments.forEach(cm=>{
      const cmIsMe=cm.authorId==='me';
      const cmContact=S.contacts.find(c=>c.id===cm.authorId);
      const cmName=cmIsMe?S.me.name:(cmContact?.name||'?');
      commentsHtml+=`<div class="feed-comment"><span class="comment-name">${cmName}：</span>${cm.text}</div>`;
    });
    commentsHtml+='</div>';
  }
  return`<div class="feed-item" data-post-id="${post.id}">
    <div class="feed-header">${authorAv}<div><div style="font-size:14px;font-weight:500;">${authorName}</div><div style="font-size:11px;color:var(--text3);">${fmt(post.ts)}</div></div></div>
    <div class="feed-content">${post.text}</div>
    <div class="feed-actions">
      <div class="feed-action ${liked?'liked':''}" onclick="likePost('${post.id}')">❤️ ${likeCount}</div>
      <div class="feed-action" onclick="commentPost('${post.id}')">💬 コメント</div>
    </div>
    ${commentsHtml}
  </div>`;
}

function createPost(){
  showModal(`<div class="modal"><div class="modal-title">投稿を作成</div><textarea class="inp" id="post-text" placeholder="今何してる？" style="min-height:100px;"></textarea><div class="modal-btns"><button class="btn" onclick="submitPost()">投稿する</button><button class="btn-outline" onclick="closeModal()">キャンセル</button></div></div>`);
}
function submitPost(){
  const text=document.getElementById('post-text')?.value.trim();if(!text)return;
  const post={id:uid(),authorId:'me',text,ts:Date.now(),likedBy:[],comments:[]};
  S.feed.push(post);save();closeModal();renderFeedTab();
  S.contacts.forEach(c=>{const delay=Math.random()*300000+30000;setTimeout(()=>aiReactToPost(post.id,c.id),delay);});
}
async function aiReactToPost(postId,cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c||!S.apiKey)return;
  const post=S.feed.find(p=>p.id===postId);if(!post)return;
  const resp=await callAI([{role:'user',content:`${S.me.name}の投稿:「${post.text}」\nJSON形式で回答: {"like":true/false,"comment":true/false,"text":"コメント内容"}`}],`${c.persona||`あなたは${c.name}です。`}SNSの投稿に反応してください。JSONのみ返してください。`);
  if(!resp)return;
  try{
    const d=JSON.parse(resp.replace(/```json|```/g,'').trim());
    const p=S.feed.find(x=>x.id===postId);if(!p)return;
    if(d.like&&!p.likedBy.includes(cid))p.likedBy.push(cid);
    if(d.comment&&d.text)p.comments.push({id:uid(),authorId:cid,text:d.text,ts:Date.now()});
    save();if(activeTab==='feed')renderFeedTab();
  }catch(e){}
}
function likePost(postId){
  const post=S.feed.find(p=>p.id===postId);if(!post)return;
  if(!post.likedBy)post.likedBy=[];
  const idx=post.likedBy.indexOf('me');
  if(idx>=0)post.likedBy.splice(idx,1);else post.likedBy.push('me');
  save();renderFeedTab();
}
function commentPost(postId){
  showModal(`<div class="modal"><div class="modal-title">コメント</div><input class="inp" id="comment-text" placeholder="コメントを入力"><div class="modal-btns"><button class="btn" onclick="submitComment('${postId}')">送信</button><button class="btn-outline" onclick="closeModal()">キャンセル</button></div></div>`);
}
function submitComment(postId){
  const text=document.getElementById('comment-text')?.value.trim();if(!text)return;
  const post=S.feed.find(p=>p.id===postId);if(!post)return;
  if(!post.comments)post.comments=[];
  post.comments.push({id:uid(),authorId:'me',text,ts:Date.now()});
  save();closeModal();renderFeedTab();
  S.contacts.forEach(c=>{
    const isAuthor=c.id===post.authorId;
    const hasCommented=post.comments.some(cm=>cm.authorId===c.id&&cm.authorId!=='me');
    if(isAuthor||hasCommented){
      const delay=Math.random()*60000+5000;
      setTimeout(()=>aiReplyToComment(postId,c.id,text),delay);
    }
  });
}
async function aiReplyToComment(postId,replierId,commentText){
  const c=S.contacts.find(x=>x.id===replierId);if(!c||!S.apiKey)return;
  const post=S.feed.find(p=>p.id===postId);if(!post)return;
  const reply=await callAI([{role:'user',content:`投稿「${post.text}」へのコメント「${commentText}」に返信してください。1〜2文で。`}],`${c.persona||`あなたは${c.name}です。`}短く自然な日本語で返信してください。`);
  if(!reply)return;
  const p=S.feed.find(x=>x.id===postId);if(!p)return;
  if(!p.comments)p.comments=[];
  p.comments.push({id:uid(),authorId:replierId,text:reply,ts:Date.now()});
  save();if(activeTab==='feed')renderFeedTab();
}

function scheduleAIFeed(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c)return;
  const freq=(c.feedFreq||24)*3600000;
  const next=c.lastFeedTime?Math.max(5000,c.lastFeedTime+freq-Date.now()):Math.random()*freq;
  setTimeout(()=>aiPost(cid),next);
}
async function aiPost(cid){
  const c=S.contacts.find(x=>x.id===cid);if(!c||!S.apiKey)return;
  const text=await callAI([{role:'user',content:'今日のSNS投稿を書いてください。'}],`${c.persona||`あなたは${c.name}です。`}SNSに投稿する短い近況を1〜2文で書いてください。`);
  if(!text)return;
  S.feed.push({id:uid(),authorId:cid,text,ts:Date.now(),likedBy:[],comments:[]});
  c.lastFeedTime=Date.now();save();
  if(activeTab==='feed')renderFeedTab();
  scheduleAIFeed(cid);
}

function renderSettingsTab(){
  document.getElementById('nav-area').innerHTML='';
  const ca=document.getElementById('content-area');
  ca.innerHTML=`
    <div class="profile-header">${meAvEl(56)}<div><div class="profile-name">${S.me.name}</div><div class="profile-sig">${S.me.sig||'個簽なし'}</div></div></div>
    <div class="list">
      <div class="settings-row" onclick="editMyProfile()"><span>👤 ユーザーマスク</span><span style="color:var(--gray);">›</span></div>
      <div class="settings-row" onclick="confirmClearAll()"><span style="color:#e74c3c;">🗑 すべてのデータを削除する</span><span style="color:var(--gray);">›</span></div>
      <div class="settings-row" onclick="openAPISettings()"><span>🔧 API設定</span><span style="color:var(--gray);">›</span></div>
    </div>`;
}

function editMyProfile(){
  window._meAvatar=S.me.avatar||'';window._meShape=S.me.avatarShape||'circle';
  const br=(S.me.avatarShape||'circle')==='circle'?'50%':'8px';
  goSub(`
    <div style="display:flex;flex-direction:column;height:100dvh;">
      <div class="hdr" style="display:flex;align-items:center;gap:12px;">
        <div class="back-btn" onclick="closeSub()">←</div>
        <div style="flex:1;text-align:center;font-size:16px;font-weight:600;color:var(--pink);">ユーザーマスク</div>
        <div style="width:32px;"></div>
      </div>
      <div class="list" style="padding:16px;display:flex;flex-direction:column;gap:14px;">
        <div class="avatar-picker">
          <div id="me-av-preview" style="width:80px;height:80px;border-radius:${br};background:#555;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;cursor:pointer;" onclick="document.getElementById('me-av-file').click()">${S.me.avatar?`<img src="${S.me.avatar}" style="width:100%;height:100%;object-fit:cover;">`:(S.me.name||'私').charAt(0)}</div>
          <input type="file" id="me-av-file" accept="image/*" style="display:none;" onchange="previewMeProfile(this)">
          <div class="shape-toggle">
            <div class="shape-btn ${(S.me.avatarShape||'circle')==='circle'?'active':''}" id="me-shape-circle" onclick="setMeShape('circle')">⭕ 円形</div>
            <div class="shape-btn ${S.me.avatarShape==='square'?'active':''}" id="me-shape-square" onclick="setMeShape('square')">⬜ 角丸</div>
          </div>
        </div>
        <div><div class="inp-label">名前</div><input class="inp" id="me-name" value="${S.me.name||''}"></div>
        <div><div class="inp-label">個簽</div><input class="inp" id="me-sig" value="${S.me.sig||''}"></div>
        <div><div class="inp-label">ステータス</div><input class="inp" id="me-status" value="${S.me.status||''}" placeholder="現在の状態"></div>
        <div><div class="inp-label">AIへの人設</div><textarea class="inp" id="me-persona">${S.me.persona||''}</textarea></div>
        <button class="btn" onclick="saveMyProfile()">保存</button>
      </div>
    </div>`);
}
function previewMeProfile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    window._meAvatar=e.target.result;
    const el=document.getElementById('me-av-preview');
    if(el)el.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
  };r.readAsDataURL(f);
}
function setMeShape(s){
  window._meShape=s;
  const el=document.getElementById('me-av-preview');
  if(el)el.style.borderRadius=s==='circle'?'50%':'8px';
  document.querySelectorAll('#me-shape-circle,#me-shape-square').forEach(b=>b.classList.remove('active'));
  document.getElementById('me-shape-'+s)?.classList.add('active');
}
function saveMyProfile(){
  S.me.name=document.getElementById('me-name')?.value.trim()||'私';
  S.me.sig=document.getElementById('me-sig')?.value.trim()||'';
  S.me.status=document.getElementById('me-status')?.value.trim()||'';
  S.me.persona=document.getElementById('me-persona')?.value.trim()||'';
  S.me.avatar=window._meAvatar||S.me.avatar||'';
  S.me.avatarShape=window._meShape||'circle';
  save();closeSub();renderRoot();
}
function confirmClearAll(){
  showModal(`<div class="modal"><div class="modal-title" style="color:#e74c3c;">⚠️ 全データ削除</div><p style="text-align:center;font-size:13px;color:var(--text3);margin-bottom:16px;">全ての連絡先・グループ・動態が削除されます。</p><div class="modal-btns"><button class="btn-danger" onclick="clearAll()">もちろん</button><button class="btn-outline" onclick="closeModal()">キャンセル</button></div></div>`);
}
function clearAll(){S.contacts=[];S.groups=[];S.messages={};S.feed=[];S.pinnedId=null;save();closeModal();renderRoot();}
function openAPISettings(){
  goSub(`
    <div style="display:flex;flex-direction:column;height:100dvh;">
      <div class="hdr" style="display:flex;align-items:center;gap:12px;">
        <div class="back-btn" onclick="closeSub()">←</div>
        <div style="flex:1;text-align:center;font-size:16px;font-weight:600;color:var(--pink);">API設定</div>
        <div style="width:32px;"></div>
      </div>
      <div class="list" style="padding:16px;display:flex;flex-direction:column;gap:14px;">
        <div><div class="inp-label">API URL</div><input class="inp" id="api-url" value="${S.apiUrl||'https://api.groq.com/openai/v1/chat/completions'}"></div>
        <div><div class="inp-label">モデル</div><input class="inp" id="api-model" value="${S.model||'llama3-8b-8192'}"></div>
        <div><div class="inp-label">API キー</div><input class="inp" id="api-key" type="password" value="${S.apiKey||''}" placeholder="gsk_..."></div>
        <div style="font-size:12px;color:var(--text3);background:#2a2a2a;padding:10px;border-radius:8px;">Groq推奨: llama3-8b-8192 / mixtral-8x7b-32768 / gemma2-9b-it</div>
        <button class="btn" onclick="saveAPI()">保存</button>
      </div>
    </div>`);
}
function saveAPI(){
  S.apiUrl=document.getElementById('api-url')?.value.trim()||'';
  S.model=document.getElementById('api-model')?.value.trim()||'llama3-8b-8192';
  S.apiKey=document.getElementById('api-key')?.value.trim()||'';
  save();closeSub();alert('API設定を保存しました');
}

function initFeeds(){S.contacts.forEach(c=>scheduleAIFeed(c.id));}
renderRoot();
initFeeds();
</script>
</body>
</html>
